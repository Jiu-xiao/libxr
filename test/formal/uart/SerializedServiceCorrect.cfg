SPECIFICATION Spec

CONSTANTS
  Publishers = {p0, p1, p2}
  EventBits = {write, complete}
  Contexts = {thread, isr}
  WriteEvent = write
  CompleteEvent = complete
  MultiEventPublisher = p2
  IsrPublisher = p1
  ThreadContext = thread
  IsrContext = isr
  PublisherEvents <- DefaultPublisherEvents
  PublisherContext <- DefaultPublisherContext
  NoOwner = NoOwner
  NoContext = NoContext
  DurableRelease = TRUE

INVARIANT TypeOK
INVARIANT OwnerUnique
INVARIANT OwnerConsistent
INVARIANT NoLostEvents
INVARIANT HandlerUsesOwnerContext
INVARIANT TerminalAccounting

PROPERTY Termination
