SPECIFICATION FairSpec

CONSTANTS
  Records = {r0, r1, r2}
  NoRecord = NoRecord
  BreakPromoteBeforePublish = FALSE
  BreakTerminalDoubleFinish = FALSE
  BreakRetryConsumesRecord = FALSE
  BreakFinishWrongRecord = FALSE

INVARIANT TypeOK
INVARIANT QueueHasNoDuplicates
INVARIANT PayloadMetadataAligned
INVARIANT ActiveStateConsistent
INVARIANT FinishAtMostOnce
INVARIANT FinishMatchesState

PROPERTY RunningWriteEventuallyResolves
PROPERTY PrivateCopyEventuallyPublishes
PROPERTY RetryEventuallyRedispatches
PROPERTY OwnerEventuallyReleases

CHECK_DEADLOCK FALSE
