# Simple workflow for deploying static content to GitHub Pages
name: Generate and Deploy Doxygen Docs

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, and cancel any in-progress run when a
# newer push arrives. Without this, overlapping runs both upload a
# "github-pages" artifact against the same Pages deployment, which makes
# deploy-pages fail with "Multiple artifacts named github-pages" and can leave
# a later run blocking on the environment lock until it times out.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install documentation dependencies
        run: sudo apt-get update && sudo apt-get install -y graphviz wget

      - name: Install Doxygen
        run: |
          DOXYGEN_VERSION=1.12.0
          DOXYGEN_TARBALL="doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          DOXYGEN_URL="https://github.com/doxygen/doxygen/releases/download/Release_1_12_0/${DOXYGEN_TARBALL}"

          wget \
            --tries=5 \
            --waitretry=10 \
            --retry-connrefused \
            --retry-on-http-error=403,429,500,502,503,504 \
            --timeout=30 \
            --continue \
            "$DOXYGEN_URL"
          echo "3c42c3f3fb206732b503862d9c9c11978920a8214f223a3950bbf2520be5f647  ${DOXYGEN_TARBALL}" | sha256sum -c -
          tar xzf "$DOXYGEN_TARBALL"
          sudo ln -sf "$(pwd)"/doxygen-${DOXYGEN_VERSION}/bin/* /usr/bin

      - name: Check Doxygen Version
        run: doxygen --version

      - name: Generate Documentation
        run: doxygen Doxyfile      
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'doc/html'
      - name: Deploy to GitHub Pages
        id: deployment
        timeout-minutes: 5
        uses: actions/deploy-pages@v4
