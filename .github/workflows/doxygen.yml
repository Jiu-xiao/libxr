# Simple workflow for deploying static content to GitHub Pages
name: Generate and Deploy Doxygen Docs

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, and cancel any in-progress run when a
# newer push arrives. Without this, overlapping runs both upload a
# "github-pages" artifact against the same Pages deployment, which makes
# deploy-pages fail with "Multiple artifacts named github-pages" and can leave
# a later run blocking on the environment lock until it times out.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Generate docs inside the prebuilt image (doxygen + graphviz already
  # installed), then hand the html to the deploy job as a Pages artifact.
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jiu-xiao/libxr-docs:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Doxygen Version
        run: doxygen --version

      - name: Generate Documentation
        run: doxygen Doxyfile

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'doc/html'

  # Deploy runs on the host runner: the Pages deploy action needs the runner
  # environment, not the docs container.
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        timeout-minutes: 5
        uses: actions/deploy-pages@v4
